name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    # Only run for ansible organization
    if: github.repository_owner == 'ansible'

    permissions:
      contents: read
      pull-requests: read

    env:
      ANSIBLE_CHATBOT_VERSION: 'test'
      CONTAINER_RUNTIME: 'podman'
      SERVER_STARTUP_TIMEOUT: '300'
      UV_CACHE_DIR: /tmp/.uv-cache
      HF_HOME: /tmp/.cache/huggingface

    steps:
      - name: Free up disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Cache HuggingFace models
        uses: actions/cache@v5
        with:
          path: ${{ env.HF_HOME }}
          key: hf-models-${{ runner.os }}-all-MiniLM-L6-v2
          restore-keys: |
            hf-models-${{ runner.os }}-

      - name: Setup test data
        run: make setup-test

      - name: Build container image with Buildah
        id: build-image
        uses: redhat-actions/buildah-build@v2
        with:
          image: ansible-chatbot-stack
          tags: test
          containerfiles: |
            ./Containerfile
          build-args: |
            ANSIBLE_CHATBOT_VERSION=test

      - name: Verify container image
        run: podman images ${{ steps.build-image.outputs.image-with-tag }}

      - name: Run integration tests
        run: uv run --group test pytest tests/ -v -s --tb=long

      # Generate minimal coverage report for Codecov onboarding
      # This ensures the repository appears as "onboarded" in Codecov dashboard
      # for management tracking and DORA metrics, even without actual coverage data.
      # Note: This is an infrastructure/integration project with no Python source code to cover.
      # The tests verify the containerized chatbot stack works end-to-end via HTTP API.
      - name: Generate placeholder coverage report
        run: |
          cat > coverage.xml << 'EOF'
          <?xml version="1.0" ?>
          <coverage version="1.0">
            <packages>
              <package name="ansible-chatbot-stack" line-rate="0.0" branch-rate="0.0" complexity="0">
                <classes></classes>
              </package>
            </packages>
          </coverage>
          EOF

      - name: Upload coverage to Codecov
        # Skip for fork PRs where secrets are not available
        if: (github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request') && github.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@0f8570b1a125f4937846a11fcfa3bcd548bd8c97 # v4.6.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          url: ${{ vars.CODECOV_URL }}
          files: ./coverage.xml
          flags: ansible-chatbot-stack
          fail_ci_if_error: false

      - name: Upload test artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            tests/test_data/
            .pytest_cache/
          retention-days: 3

      - name: Summary
        if: always()
        run: |
          echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Container Image**: ${{ steps.build-image.outputs.image-with-tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ All integration tests passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some tests failed. Check the logs above for details." >> $GITHUB_STEP_SUMMARY
          fi
