name: Code Coverage
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  # have the ability to trigger this workflow manually
  workflow_dispatch:

jobs:
  build:
    name: Unit Test and SonarCloud Scan

    runs-on: ubuntu-latest

    env:
      UV_CACHE_DIR: /tmp/.uv-cache
      HF_HOME: /tmp/.cache/huggingface
      ANSIBLE_CHATBOT_VERSION: 'test'
      CONTAINER_RUNTIME: 'podman'
      SERVER_STARTUP_TIMEOUT: '300'

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

    ##############
    # Python tests
    ##############
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Cache uv dependencies
      uses: actions/cache@v4
      with:
        path: ${{ env.UV_CACHE_DIR }}
        key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
        restore-keys: |
          uv-${{ runner.os }}-

    - name: Cache HuggingFace models
      uses: actions/cache@v4
      with:
        path: ${{ env.HF_HOME }}
        key: hf-models-${{ runner.os }}-all-MiniLM-L6-v2
        restore-keys: |
          hf-models-${{ runner.os }}-

    - name: Setup test data
      run: make setup-test

    - name: Build container image with Buildah
      id: build-image
      uses: redhat-actions/buildah-build@v2
      with:
        image: ansible-chatbot-stack
        tags: test
        containerfiles: |
          ./Containerfile
        build-args: |
          ANSIBLE_CHATBOT_VERSION=test

    - name: Verify container image
      run: podman images ${{ steps.build-image.outputs.image-with-tag }}

    - name: Running Unit Tests with Coverage
      run: |
        uv run --group test pytest tests/ --cov=. --cov-report=xml --cov-report=term -v
        cat coverage.xml

    # See https://sonarsource.atlassian.net/browse/SONARPY-1203
    - name: Fix paths in coverage file
      run: |
        sed -i "s,/home/runner/work/${{ github.event.repository.name }}/${{ github.event.repository.name }}/,/github/workspace/,g" coverage.xml

    #####################
    # SonarCloud coverage
    #####################
    - name: Extract repo owner and name
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        if [ "${{ github.event.repository.fork }}" = "true" ]; then
          PARENT_REPO_SLUG=$(gh api repos/${{ github.repository }} | jq -r '.parent.full_name')
          IFS="/" read -r REPO_OWNER REPO_NAME <<< "$PARENT_REPO_SLUG"
        else
          IFS="/" read -r REPO_OWNER REPO_NAME <<< "${GITHUB_REPOSITORY}"
        fi
        echo "REPO_OWNER=$REPO_OWNER" >> $GITHUB_ENV
        echo "REPO_NAME=$REPO_NAME" >> $GITHUB_ENV

    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets[format('{0}', vars.SONAR_TOKEN_SECRET_NAME)] }}
      with:
        args: >
          -Dsonar.projectKey=${{ env.REPO_OWNER }}_${{ env.REPO_NAME }}
          -Dsonar.organization=${{ env.REPO_OWNER }}
