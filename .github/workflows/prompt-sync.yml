name: System Prompt Sync

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prompt-drift:
    name: Check prompt drift
    runs-on: ubuntu-latest
    if: github.repository_owner == 'ansible'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install jinja2

      - name: Check upstream template exists
        id: check-upstream
        run: |
          URL="https://raw.githubusercontent.com/ansible"
          URL="$URL/ansible-ai-connect-operator"
          URL="$URL/refs/heads/main/roles/chatbot/templates"
          URL="$URL/ansible-chatbot-system-prompt.txt.j2"
          if curl -sfL "$URL" -o /dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Upstream template not found (PR not merged yet?). Skipping drift check."
          fi

      - name: Regenerate prompts from upstream template
        if: steps.check-upstream.outputs.exists == 'true'
        run: python scripts/generate_system_prompts.py

      - name: Check for drift
        if: steps.check-upstream.outputs.exists == 'true'
        run: |
          if git diff --quiet -- '*.txt'; then
            echo "No drift. Prompt files are up to date."
          else
            echo "ERROR: Prompt files have drifted from upstream."
            echo "Run: python scripts/generate_system_prompts.py"
            git diff -- '*.txt'
            exit 1
          fi

  prompt-sync:
    name: Auto-sync prompts
    runs-on: ubuntu-latest
    if: >-
      github.repository_owner == 'ansible'
      && (github.event_name == 'schedule'
          || github.event_name == 'workflow_dispatch')
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install jinja2

      - name: Regenerate prompts from upstream template
        run: python scripts/generate_system_prompts.py || {
          echo "::warning::Failed to download upstream template. Skipping sync.";
          exit 0;
        }

      - name: Create PR if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- '*.txt'; then
            echo "No changes. Prompts are up to date."
            exit 0
          fi
          BRANCH="auto/sync-system-prompt-$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add '*.txt'
          git commit -m "chore: sync system prompt from upstream"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: sync system prompt from upstream (auto)" \
            --body "Auto-generated by prompt-sync workflow. The upstream template in ansible-ai-connect-operator changed. This PR updates the rendered .txt files to match." \
            --base main \
            --head "$BRANCH"
