# sonar.projectKey and sonar.organization are set dynamically
# in .github/workflows/sonarcloud.yml based on the repo owner and name

# This is an infrastructure-as-code / integration project
# We scan for security and quality issues in:
# - Python test and utility scripts
# - YAML configuration and manifests
# - Shell scripts
# - Containerfile

# Python settings
sonar.python.version=3.12

# Source files to scan (all infrastructure code)
sonar.sources = .

# Test files
sonar.tests = tests/
sonar.test.inclusions = tests/**/test_*.py

# Files to exclude from analysis
# Version control and dependencies: .git, .venv, node_modules, __pycache__
# Lock files and generated content: *.lock, uv.lock
# Documentation: *.md, README.*, LICENSE.*
# Build artifacts: .pytest_cache, htmlcov, .coverage, coverage.xml
sonar.exclusions = \
  .git/**,\
  .venv/**,\
  node_modules/**,\
  __pycache__/**,\
  *.lock,\
  uv.lock,\
  *.md,\
  README.*,\
  LICENSE.*,\
  .pytest_cache/**,\
  htmlcov/**,\
  .coverage,\
  coverage.xml

# Exclude utility scripts from coverage analysis
sonar.coverage.exclusions = scripts/**

# Enable quality gate
sonar.qualitygate.wait=true
